<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals" subtitle="Ink, paper, cream and the editor's own dark-panel scale" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#161310;padding:18px;box-sizing:border-box;font-family:var(--font-body)}
  .row{display:flex;gap:10px}
  .sw{flex:1;height:96px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid rgba(255,255,255,.08)}
  .nm{font-family:var(--font-label);font-weight:700;font-size:12px;letter-spacing:.03em;text-transform:uppercase}
  .hex{font-size:10px;opacity:.75;margin-top:2px}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--ink);color:var(--cream)"><div class="nm">Ink</div><div class="hex">--ink · #2C2823</div></div>
  <div class="sw" style="background:var(--paper);color:var(--ink)"><div class="nm">Paper</div><div class="hex">--paper · #F1ECE1</div></div>
  <div class="sw" style="background:var(--cream);color:var(--ink)"><div class="nm">Cream</div><div class="hex">--cream · #EDDCB2</div></div>
  <div class="sw" style="background:var(--muted-cream);color:var(--ink)"><div class="nm">Muted cream</div><div class="hex">--muted-cream · #D1C1A3</div></div>
  <div class="sw" style="background:var(--panel);color:var(--cream)"><div class="nm">Editor panel</div><div class="hex">--panel · #26221D</div></div>
</div>
</body></html>
