<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark & monogram" subtitle="No image logo exists in the source — the mark is always drawn in type" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--ink);padding:20px;box-sizing:border-box;display:flex;align-items:center;gap:16px;color:var(--cream);font-family:var(--font-body)}
.ring{width:64px;height:64px;border-radius:50%;border:3px solid var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--font-label);font-weight:700;font-size:22px}
.word{font-family:var(--font-display);font-size:40px}
.word .dot{color:var(--sig-oublies)}
.meta{font-family:var(--font-label);font-size:11px;color:#776f60;letter-spacing:.05em;text-transform:uppercase;margin-left:auto}
</style></head>
<body>
<div class="ring">1·2</div>
<div class="word">une<span class="dot">·</span>deux</div>
<div class="meta">No bitmap/SVG logo file in the source repo — never draw one from scratch</div>
</body></html>
