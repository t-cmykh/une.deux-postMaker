<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Flat by default — radius only appears on editor chrome, never on slide content" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--ink);padding:18px;box-sizing:border-box;font-family:var(--font-label);color:#9a968c;display:flex;gap:14px}
.box{width:90px;height:90px;background:var(--panel);border:1px solid var(--border-editor);display:flex;align-items:flex-end;justify-content:center;font-size:10px;padding-bottom:6px}
</style></head>
<body>
<div class="box" style="border-radius:7px">sm · 7px</div>
<div class="box" style="border-radius:9px">md · 9px</div>
<div class="box" style="border-radius:10px">lg · 10px</div>
<div class="box" style="border-radius:20px">pill · 20px</div>
<div class="box" style="border-radius:50%">full</div>
</body></html>
