<!-- @dsCard group="Colors" viewport="700x180" name="Series signature colors" subtitle="Each of the 4 series locks its own accent — never mix them" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink);padding:18px;box-sizing:border-box;font-family:var(--font-body)}
  .row{display:flex;gap:10px}
  .sw{flex:1;height:96px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .nm{font-family:var(--font-label);font-weight:700;font-size:12px;letter-spacing:.03em;text-transform:uppercase}
  .hex{font-size:10px;opacity:.75;margin-top:2px}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--sig-cejourla);color:var(--on-sig-cejourla)"><div class="nm">Ce jour-là</div><div class="hex">--sig-cejourla · #C2A04E</div></div>
  <div class="sw" style="background:var(--sig-oublies);color:var(--on-sig-oublies)"><div class="nm">Les oubliés</div><div class="hex">--sig-oublies · #27543C</div></div>
  <div class="sw" style="background:var(--swatch-portraits);color:var(--cream)"><div class="nm">Portraits</div><div class="hex">--swatch-portraits · #2C2823</div></div>
  <div class="sw" style="background:var(--sig-arretdejeu);color:var(--on-sig-arretdejeu)"><div class="nm">L'arrêt de jeu</div><div class="hex">--sig-arretdejeu · #A8452B</div></div>
</div>
</body></html>
