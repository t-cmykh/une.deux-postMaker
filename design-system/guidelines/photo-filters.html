<!-- @dsCard group="Brand" viewport="700x160" name="Photo grades" subtitle="Per-series tint over background media — flat color overlay, not a LUT" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--ink);padding:18px;box-sizing:border-box;font-family:var(--font-label);color:#9a968c;display:flex;gap:10px}
.sw{flex:1;height:90px;border-radius:4px;position:relative;background:linear-gradient(180deg,#9a968c,#4f4c44);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font-size:10px;color:var(--cream);text-transform:uppercase}
.sw::after{content:"";position:absolute;inset:0;border-radius:4px}
</style></head>
<body>
<div class="sw" style="background-image:linear-gradient(180deg,#9a968c,#4f4c44)"><div style="position:absolute;inset:0;background:var(--grade-cejourla);border-radius:4px"></div><span style="position:relative">Sépia · Ce jour-là</span></div>
<div class="sw"><div style="position:absolute;inset:0;background:var(--grade-oublies);border-radius:4px"></div><span style="position:relative">Froid · Les oubliés</span></div>
<div class="sw"><div style="position:absolute;inset:0;background:var(--grade-portraits);border-radius:4px"></div><span style="position:relative">Studio · Portraits</span></div>
<div class="sw"><div style="position:absolute;inset:0;background:var(--grade-arretdejeu);border-radius:4px"></div><span style="position:relative">Rouille · Arrêt de jeu</span></div>
</body></html>
