<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>une·deux — Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3rem;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  h1 span { font-weight: 700; }
  .cards {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 1rem;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 260px;
    height: 320px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 1rem;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.03);
  }
  .card:hover {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08);
    transform: translateY(-4px);
  }
  .card .icon { font-size: 4rem; margin-bottom: 1.5rem; }
  .card .label {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card .desc {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
  <h1>une<span>·</span>deux</h1>
  <div class="cards">
    <a href="reel.html" class="card">
      <div class="icon">&#9638;</div>
      <div class="label">Post</div>
      <div class="desc">Créer un post scrapbook</div>
    </a>
    <a href="post.html" class="card">
      <div class="icon">&#9654;</div>
      <div class="label">Reel</div>
      <div class="desc">Créer un reel scrapbook</div>
    </a>
  </div>
</body>
</html>
