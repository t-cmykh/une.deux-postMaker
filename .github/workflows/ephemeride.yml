name: Éphéméride foot une·deux

# Génère chaque soir à 20h (heure de Paris) l'éphéméride foot du LENDEMAIN,
# filtrée « angle une·deux », et l'envoie par email.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - ANTHROPIC_API_KEY  : clé API Anthropic (génération du contenu)
#   - GMAIL_ADDRESS      : adresse Gmail expéditrice = destinataire (ex. t.louisor@gmail.com)
#   - GMAIL_APP_PASSWORD : mot de passe d'application Gmail (PAS le mot de passe du compte ;
#                          à créer sur https://myaccount.google.com/apppasswords, 2FA requise)
#
# GitHub planifie en UTC sans gestion de l'heure d'été. On déclare donc deux
# horaires (été / hiver) et une garde « 20h Europe/Paris » ne laisse passer
# que le bon : un seul lancement par jour, à 20h locale toute l'année.

on:
  schedule:
    - cron: '7 18 * * *'   # 20h07 Paris en été (CEST = UTC+2)
    - cron: '7 19 * * *'   # 20h07 Paris en hiver (CET = UTC+1)
  workflow_dispatch: {}      # lancement manuel pour tester

permissions:
  contents: read
  id-token: write   # requis par la Claude Code Action (jeton OIDC)

jobs:
  ephemeride:
    runs-on: ubuntu-latest
    steps:
      - name: Ne tourner qu'à 20h (heure de Paris) sur les lancements planifiés
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HEURE=$(TZ=Europe/Paris date +%H)
            if [ "$HEURE" != "20" ]; then
              echo "Heure de Paris = ${HEURE}h, pas 20h — on saute ce déclenchement."
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Date de demain (Europe/Paris)
        if: steps.guard.outputs.run == 'true'
        id: date
        run: echo "demain=$(TZ=Europe/Paris date -d '+1 day' '+%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Préparer le dossier de sortie
        if: steps.guard.outputs.run == 'true'
        run: mkdir -p out

      - name: Générer l'éphéméride foot du lendemain
        if: steps.guard.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Tu produis l'éphéméride foot quotidienne du média Instagram une·deux
            (@une.deux, « le foot en deux touches »).

            1. Calcule la date de DEMAIN (jour suivant aujourd'hui, fuseau Europe/Paris).
            2. Lis SKILL.md à la racine du dépôt pour t'imprégner du ton, des séries
               et de la banque de hooks.
            3. Recherche sur le web et VÉRIFIE les événements marquants de l'histoire
               du football survenus à cette date (même jour/mois, tous millésimes) :
               finales et exploits de Coupe du Monde / Euro / Copa America / Coupe des
               Confédérations, upsets, records, naissances ou décès de joueurs
               marquants. Chaque fait cité doit être vérifié et sourcé — c'est la
               règle absolue du SKILL.md.
            4. Filtre « angle une·deux » : privilégie les histoires méconnues,
               sous-cotées, les destins oubliés et les contradictions nommées ; mets
               en retrait les sujets ultra-connus. Respecte les règles permanentes
               (pas de comparaison avec les USA, etc.).
            5. Écris le résultat dans le fichier `out/ephemeride.html` : un corps
               d'email HTML autonome (pas de <html>/<head>, juste un <div> stylé en
               inline-CSS) contenant un tableau
               | Année | Événement (factuel, vérifié) | Angle une·deux |
               où l'angle cite la série (#lesouscotés / #undestinparjour /
               #lachutedesgéants / #ledébat) et la famille de hook de la banque du
               SKILL.md, suivi d'une reco du sujet du jour et de la liste des liens
               sources (balises <a>).

            Le SEUL livrable est le fichier `out/ephemeride.html`. N'ouvre aucune
            issue ni pull request, ne modifie aucun autre fichier.
          claude_args: |
            --allowedTools WebSearch,WebFetch,Read,Write
            --max-turns 30

      - name: Vérifier que le contenu a bien été généré
        if: steps.guard.outputs.run == 'true'
        run: test -s out/ephemeride.html

      - name: Envoyer l'email
        if: steps.guard.outputs.run == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ⚽ Éphéméride foot une·deux — ${{ steps.date.outputs.demain }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: une·deux bot <${{ secrets.GMAIL_ADDRESS }}>
          html_body: file://out/ephemeride.html
